<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --green: #2EBE6E;
  --green-dark: #1a9a52;
  --danger: #e74c3c;
  --blue: #3B82F6;
  --bg: #f0f0eb;
  --white: #ffffff;
  --text: #1a1a1a;
  --text-muted: #888;
  --border: #ddddd5;
  --sidebar-w: 260px;
  --topbar-h: 46px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; font-family:'Open Sans',sans-serif; background:var(--bg); color:var(--text); }

/* ══ LOGIN ══════════════════════════════════════════════ */
#login-screen {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg,#f5f5f0,#eeeee8);
}
.login-card {
  background:var(--white); border-radius:16px; padding:3rem 2.5rem;
  width:100%; max-width:400px; box-shadow:0 8px 40px rgba(0,0,0,0.08);
}
.login-logo { font-family:'Montserrat',sans-serif; font-weight:900; font-size:1.8rem; text-align:center; margin-bottom:0.25rem; }
.login-logo span { color:var(--green); }
.login-sub { text-align:center; color:var(--text-muted); font-size:0.85rem; margin-bottom:2rem; }
.form-field { display:flex; flex-direction:column; gap:0.4rem; margin-bottom:1rem; }
.form-field label { font-family:'Montserrat',sans-serif; font-weight:600; font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); }
.form-field input { border:1.5px solid var(--border); border-radius:8px; padding:0.75rem 0.9rem; font-size:0.9rem; outline:none; transition:border-color 0.2s; }
.form-field input:focus { border-color:var(--green); }
.login-error { color:var(--danger); font-size:0.85rem; margin-bottom:0.75rem; display:none; }
.btn-login {
  width:100%; padding:0.8rem; background:var(--green); color:#000; border:none;
  border-radius:8px; font-family:'Montserrat',sans-serif; font-weight:700;
  font-size:0.9rem; cursor:pointer; margin-top:0.5rem; transition:background 0.2s;
}
.btn-login:hover { background:var(--green-dark); }

/* ══ ADMIN LAYOUT ═══════════════════════════════════════ */
#admin-app { display:none; height:100vh; flex-direction:column; }
#admin-app.active { display:flex; }

/* ── TOP BAR ── */
#topbar {
  height:var(--topbar-h); background:var(--white); border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 1rem; gap:0.75rem; flex-shrink:0; z-index:200;
  box-shadow:0 1px 4px rgba(0,0,0,0.06);
}
.topbar-logo { font-family:'Montserrat',sans-serif; font-weight:900; font-size:1rem; }
.topbar-logo span { color:var(--green); }
.topbar-sep { width:1px; height:22px; background:var(--border); margin:0 0.25rem; }
.topbar-spacer { flex:1; }
.tb-btn {
  background:none; border:1px solid var(--border); border-radius:6px;
  padding:4px 10px; font-size:11.5px; cursor:pointer; color:var(--text);
  font-family:'Montserrat',sans-serif; font-weight:600;
  transition:background 0.15s; display:flex; align-items:center; gap:3px;
}
.tb-btn:hover { background:var(--bg); }
.tb-btn.active { background:var(--text); color:#fff; border-color:var(--text); }
.tb-btn:disabled { opacity:0.35; cursor:not-allowed; }
.tb-publish {
  background:var(--green); color:#000; border:none; border-radius:6px;
  padding:6px 16px; font-family:'Montserrat',sans-serif; font-weight:700;
  font-size:12px; cursor:pointer; transition:background 0.2s;
}
.tb-publish:hover { background:var(--green-dark); color:#fff; }
.tb-logout { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:12px; padding:4px 6px; }
.tb-logout:hover { color:var(--danger); }

/* ── MAIN ROW ── */
#main-row { flex:1; display:flex; overflow:hidden; }

/* ══ SIDEBAR ════════════════════════════════════════════ */
#sidebar {
  width:var(--sidebar-w); background:var(--white); flex-shrink:0;
  display:flex; flex-direction:column; overflow:hidden;
  box-shadow:2px 0 12px rgba(0,0,0,0.08); z-index:100;
}
/* Three level panels stacked side by side, clip to sidebar width */
#sidebar-panels-wrap { flex:1; overflow:hidden; position:relative; }
.sidebar-panel {
  position:absolute; top:0; left:0; right:0; bottom:0;
  overflow-y:auto; transition:transform 0.25s cubic-bezier(0.4,0,0.2,1);
  background:var(--white);
}
.sidebar-panel.level-hidden-right { transform:translateX(100%); }
.sidebar-panel.level-hidden-left  { transform:translateX(-30%); opacity:0.5; }
.sidebar-panel.level-active       { transform:translateX(0); opacity:1; }

/* Panel header */
.panel-back {
  display:flex; align-items:center; gap:6px; padding:12px 16px 8px;
  font-size:12px; color:var(--text-muted); cursor:pointer;
  border-bottom:1px solid var(--border); background:var(--white);
  position:sticky; top:0; z-index:10;
}
.panel-back:hover { color:var(--text); }
.panel-back .back-arrow { font-size:14px; }
.panel-section-title {
  padding:8px 16px 4px; font-family:'Montserrat',sans-serif; font-weight:700;
  font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-muted);
  margin-top:4px;
}

/* Menu items */
.menu-item {
  display:flex; align-items:center; gap:10px; padding:10px 16px;
  cursor:pointer; transition:background 0.12s; border-left:3px solid transparent;
  font-size:13.5px; color:var(--text);
}
.menu-item:hover { background:rgba(46,190,110,0.06); }
.menu-item.active { background:rgba(46,190,110,0.1); border-left-color:var(--green); color:var(--green); font-weight:600; }
.menu-item .mi-icon { font-size:16px; width:22px; text-align:center; flex-shrink:0; }
.menu-item .mi-label { flex:1; }
.menu-item .mi-arrow { font-size:11px; color:var(--text-muted); }
.menu-item.has-dot::after { content:''; width:7px; height:7px; border-radius:50%; background:var(--green); margin-left:4px; flex-shrink:0; }

/* Sidebar bottom */
.sidebar-bottom { padding:12px 16px; border-top:1px solid var(--border); }
.sidebar-bottom button {
  width:100%; padding:8px; background:none; border:1px solid var(--border);
  border-radius:6px; font-size:12.5px; color:var(--text-muted); cursor:pointer;
  font-family:'Open Sans',sans-serif; transition:background 0.15s;
}
.sidebar-bottom button:hover { background:var(--bg); color:var(--danger); border-color:var(--danger); }

/* ══ FORMS IN SIDEBAR ═══════════════════════════════════ */
.sf-body { padding:16px; display:flex; flex-direction:column; gap:12px; }
.sf-label {
  font-family:'Montserrat',sans-serif; font-weight:700; font-size:10px;
  letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted);
  margin-bottom:3px; display:block;
}
.sf-input {
  width:100%; border:1.5px solid var(--border); border-radius:7px;
  padding:8px 10px; font-size:13px; font-family:'Open Sans',sans-serif;
  outline:none; transition:border-color 0.2s; color:var(--text);
}
.sf-input:focus { border-color:var(--green); }
.sf-textarea {
  width:100%; border:1.5px solid var(--border); border-radius:7px;
  padding:8px 10px; font-size:13px; font-family:'Open Sans',sans-serif;
  outline:none; min-height:80px; resize:vertical; transition:border-color 0.2s;
}
.sf-textarea:focus { border-color:var(--green); }
.sf-btn {
  padding:9px 16px; border:none; border-radius:7px; cursor:pointer;
  font-family:'Montserrat',sans-serif; font-weight:700; font-size:12px;
  letter-spacing:0.05em; transition:background 0.2s; width:100%;
}
.sf-btn-green { background:var(--green); color:#000; }
.sf-btn-green:hover { background:var(--green-dark); color:#fff; }
.sf-btn-red { background:var(--danger); color:#fff; }
.sf-btn-red:hover { background:#c0392b; }
.sf-btn-gray { background:var(--bg); color:var(--text); border:1px solid var(--border); }
.sf-btn-gray:hover { background:var(--border); }

/* Design swatches */
.color-swatches { display:flex; gap:8px; flex-wrap:wrap; }
.color-swatch {
  width:52px; height:52px; border-radius:6px; cursor:pointer;
  border:2px solid transparent; transition:transform 0.15s, border-color 0.15s;
  position:relative;
}
.color-swatch:hover { transform:scale(1.08); border-color:var(--text); }
.color-swatch.active { border-color:var(--blue); }

/* Font preview box */
.font-preview-box {
  border:1.5px solid var(--border); border-radius:8px; padding:12px 14px;
  background:var(--bg);
}
.fp-label { font-size:9px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px; font-family:'Montserrat',sans-serif; font-weight:700; }
.fp-heading { font-size:20px; font-weight:700; line-height:1.2; margin-bottom:4px; }
.fp-body { font-size:12px; color:var(--text-muted); line-height:1.5; }

/* Fontsize buttons */
.fontsize-btns { display:flex; gap:6px; }
.fs-btn {
  flex:1; padding:8px 0; border:1.5px solid var(--border); border-radius:6px;
  background:none; cursor:pointer; font-family:'Montserrat',sans-serif;
  font-weight:700; font-size:12px; color:var(--text); transition:border-color 0.15s;
}
.fs-btn.active { border-color:var(--green); color:var(--green); background:rgba(46,190,110,0.08); }
.fs-btn:hover { border-color:var(--text); }

/* Media preview */
.media-preview-box {
  width:100%; height:160px; background:var(--bg); border-radius:8px;
  overflow:hidden; display:flex; align-items:center; justify-content:center;
  border:1.5px dashed var(--border); color:var(--text-muted); font-size:13px;
}
.media-preview-box img, .media-preview-box video { width:100%; height:100%; object-fit:cover; border-radius:7px; }

/* FAQ list */
.faq-row {
  display:flex; align-items:center; gap:8px; padding:10px 16px;
  border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.12s;
}
.faq-row:hover { background:var(--bg); }
.faq-row .faq-q { flex:1; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.toggle-switch {
  position:relative; width:36px; height:20px; flex-shrink:0;
}
.toggle-switch input { opacity:0; width:0; height:0; position:absolute; }
.toggle-track {
  position:absolute; inset:0; background:#ccc; border-radius:10px;
  transition:background 0.2s; cursor:pointer;
}
.toggle-track::after {
  content:''; position:absolute; top:2px; left:2px;
  width:16px; height:16px; background:#fff; border-radius:50%; transition:left 0.2s;
}
.toggle-switch input:checked + .toggle-track { background:var(--green); }
.toggle-switch input:checked + .toggle-track::after { left:18px; }

/* ══ IFRAME ═════════════════════════════════════════════ */
#iframe-outer {
  flex:1; display:flex; align-items:stretch; justify-content:center;
  overflow:hidden; background:#c8c8c0; position:relative;
  flex-direction:column;
}
.publish-bar {
  background:var(--green); color:#000; text-align:center;
  padding:0; height:0; overflow:hidden; transition:height 0.3s;
  font-family:'Montserrat',sans-serif; font-weight:700; font-size:13px;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
#iframe-scale-wrap {
  flex:1; display:flex; align-items:center; justify-content:center;
  padding:0; overflow:hidden;
}
#iframe-wrap {
  background:#fff; box-shadow:0 8px 40px rgba(0,0,0,0.15);
  transition:width 0.3s ease, border-radius 0.3s;
  width:100%; height:100%; overflow:hidden;
}
#iframe-wrap.tablet { width:768px; border-radius:4px; }
#iframe-wrap.mobile { width:390px; border-radius:20px; }
#preview-iframe { width:100%; height:100%; border:none; display:block; }
</style>

        <div id="iframe-wrap">
          <iframe id="preview-iframe" src="index.html?cms=1"></iframe>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="toast" style="display:none;position:fixed;bottom:20px;right:20px;z-index:99999;"></div>

// ══════════════════════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════════════════════
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw    = document.getElementById('login-pw').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  const { error } = await db.auth.signInWithPassword({ email, password: pw });
  if (error) { errEl.textContent = error.message; errEl.style.display = 'block'; return; }
  showAdmin();
}
async function doLogout() {
  await db.auth.signOut();
  document.getElementById('admin-app').classList.remove('active');
  document.getElementById('login-screen').style.display = 'flex';
}
async function checkSession() {
  const { data: { session } } = await db.auth.getSession();
  if (session) showAdmin();
}
async function showAdmin() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-app').classList.add('active');
  await loadContent();
  await loadFaq();
  await loadLeistungen();
  buildL1();
}

// ══════════════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════════════
async function loadContent() {
  const { data } = await db.from('content').select('key,value');
  if (data) data.forEach(({ key, value }) => { contentCache[key] = value || ''; });
}
async function loadFaq() {
  const { data } = await db.from('faq').select('*').order('reihenfolge');
  if (data) faqCache = data;
}
async function loadLeistungen() {
  const { data } = await db.from('leistungen').select('*').order('reihenfolge');
  if (data) leistungenCache = data;
}

// SIDEBAR LEVELS
// ══════════════════════════════════════════════════════════
function setLevel(n) {
  const panels = { 1:'panel-l1', 2:'panel-l2', 3:'panel-l3' };
  Object.entries(panels).forEach(([lvl, id]) => {
    const el = document.getElementById(id);
    const num = parseInt(lvl);
    if (num === n) el.className = 'sidebar-panel level-active';
    else if (num < n) el.className = 'sidebar-panel level-hidden-left';
    else el.className = 'sidebar-panel level-hidden-right';
  });
  currentLevel = n;
}

function goL2(page, backLabel) {
  l2Page = page;
  document.getElementById('l2-back-label').textContent = backLabel || 'Hauptmenü';
  buildL2(page);
  setLevel(2);
}
function goL3(buildFn, backLabel) {
  document.getElementById('l3-back-label').textContent = backLabel || 'Zurück';
  buildFn();
  setLevel(3);
}
function goBack() {
  if (currentLevel === 3) setLevel(2);
  else if (currentLevel === 2) { setLevel(1); l2Page = null; }
}

document.getElementById('l2-back-btn').addEventListener('click', goBack);
document.getElementById('l3-back-btn').addEventListener('click', goBack);

const L1_ITEMS = [
  { icon:'🏠', label:'Dashboard',           page:null,        hint:'Willkommen' },
  { icon:'🎨', label:'Website-Baukasten',   page:'baukasten'  },
  { icon:'🖼', label:'Bilder & Medien',     page:'medien'     },
  { icon:'✏️', label:'Texte & Inhalte',     page:'texte'      },
  { icon:'📋', label:'FAQ',                 page:'faq'        },
  { icon:'📞', label:'Kontakt',             page:'kontakt'    },
  { icon:'⚙️', label:'Einstellungen',       page:'einstellungen' },
];

function buildL1() {
  const menu = document.getElementById('l1-menu');
  menu.innerHTML = '';
  L1_ITEMS.forEach(item => {
    const el = document.createElement('div');
    el.className = 'menu-item';
    el.innerHTML = `<span class="mi-icon">${item.icon}</span><span class="mi-label">${item.label}</span>${item.page ? '<span class="mi-arrow">›</span>' : ''}`;
    el.addEventListener('click', () => {
      if (!item.page) { showDashboard(); return; }
      document.querySelectorAll('#l1-menu .menu-item').forEach(x => x.classList.remove('active'));
      el.classList.add('active');
      goL2(item.page, 'Hauptmenü');
    });
    menu.appendChild(el);
  });
}

function showDashboard() {
  toast('👋 Willkommen, Marc! Klicke auf ein Element in der Vorschau oder wähle einen Bereich links.');
}

function buildL2(page) {
  const c = document.getElementById('l2-content');
  c.innerHTML = '';
  if (page === 'baukasten') buildL2Baukasten(c);
  else if (page === 'medien') buildL2Medien(c);
  else if (page === 'texte') buildL2Texte(c);
  else if (page === 'kontakt') buildL2Kontakt(c);
  else if (page === 'faq') buildL2Faq(c);
  else if (page === 'einstellungen') buildL2Einstellungen(c);
  else if (page === 'design') buildL2Design(c);
  else if (page === 'sektionen') buildL2Sektionen(c);
}

// ── Sektionen → Leistungskarten ──
async function buildL2Sektionen(c) {
  _l2SektionenContainer = c;
  c.innerHTML = `
    <div class="panel-section-title">LEISTUNGSKARTEN</div>
    <div id="lk-list"></div>
    <div id="lk-add-wrap" style="padding:12px 16px;border-top:1px solid var(--border);margin-top:4px;"></div>`;

  const addBtn = document.createElement('button');
  addBtn.className = 'sf-btn sf-btn-green';
  addBtn.style.fontSize = '12px';
  addBtn.textContent = '＋ Neue Karte hinzufügen';
  addBtn.addEventListener('click', () => goL3(() => buildL3Leistung(null), 'Neue Karte'));
  c.querySelector('#lk-add-wrap').appendChild(addBtn);

  const { data } = await db.from('leistungen').select('*').order('reihenfolge');
  if (data) leistungenCache = data;
  _renderLeistungenRows();
}

function _renderLeistungenRows() {
  if (!_l2SektionenContainer) return;
  const list = _l2SektionenContainer.querySelector('#lk-list');
  if (!list) return;
  list.innerHTML = '';

  if (!leistungenCache.length) {
    list.innerHTML = '<div style="padding:16px;color:var(--text-muted);font-size:13px;">Keine Karten vorhanden.</div>';
    return;
  }

  leistungenCache.forEach((l, idx) => {
    const row = document.createElement('div');
    row.className = 'faq-row';
    row.draggable = true;
    row.dataset.idx = String(idx);
    row.style.gap = '6px';
    row.style.cursor = 'pointer';

    const handle = document.createElement('span');
    handle.textContent = '≡';
    handle.style.cssText = 'cursor:grab;color:var(--text-muted);font-size:16px;flex-shrink:0;';

    const name = document.createElement('span');
    name.textContent = l.titel;
    name.style.cssText = 'flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';

    const eyeBtn = document.createElement('button');
    eyeBtn.title = l.aktiv ? 'Ausblenden' : 'Einblenden';
    eyeBtn.textContent = l.aktiv ? '👁' : '🙈';
    eyeBtn.style.cssText = 'background:none;border:none;cursor:pointer;padding:2px 4px;font-size:14px;flex-shrink:0;';
    eyeBtn.addEventListener('click', async e => {
      e.stopPropagation();
      l.aktiv = !l.aktiv;
      await db.from('leistungen').update({ aktiv: l.aktiv }).eq('id', l.id);
      eyeBtn.textContent = l.aktiv ? '👁' : '🙈';
      eyeBtn.title = l.aktiv ? 'Ausblenden' : 'Einblenden';
      sendToIframe({ type: 'cms_reload_leistungen' });
      toast(l.aktiv ? '✓ Sichtbar' : '✓ Ausgeblendet');
    });

    const delBtn = document.createElement('button');
    delBtn.title = 'Löschen';
    delBtn.textContent = '×';
    delBtn.style.cssText = 'background:none;border:none;cursor:pointer;padding:2px 4px;font-size:18px;color:var(--danger);flex-shrink:0;line-height:1;';
    delBtn.addEventListener('click', async e => {
      e.stopPropagation();
      if (!confirm(`"${l.titel}" wirklich löschen?`)) return;
      await db.from('leistungen').delete().eq('id', l.id);
      leistungenCache.splice(leistungenCache.findIndex(x => x.id === l.id), 1);
      _renderLeistungenRows();
      sendToIframe({ type: 'cms_reload_leistungen' });
      toast('✓ Gelöscht');
    });

    row.appendChild(handle);
    row.appendChild(name);
    row.appendChild(eyeBtn);
    row.appendChild(delBtn);
    row.addEventListener('click', () => goL3(() => buildL3Leistung(l), l.titel));

    row.addEventListener('dragstart', e => {
      _dragSrcIdx = idx;
      e.dataTransfer.effectAllowed = 'move';
      row.style.opacity = '0.4';
    });
    row.addEventListener('dragend', () => { row.style.opacity = '1'; });
    row.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
    row.addEventListener('drop', async e => {
      e.preventDefault();
      const targetIdx = parseInt(row.dataset.idx);
      if (_dragSrcIdx === targetIdx || _dragSrcIdx < 0) return;
      const [moved] = leistungenCache.splice(_dragSrcIdx, 1);
      leistungenCache.splice(targetIdx, 0, moved);
      for (let i = 0; i < leistungenCache.length; i++) {
        leistungenCache[i].reihenfolge = (i + 1) * 10;
        await db.from('leistungen').update({ reihenfolge: leistungenCache[i].reihenfolge }).eq('id', leistungenCache[i].id);
      }
      _dragSrcIdx = -1;
      _renderLeistungenRows();
      sendToIframe({ type: 'cms_reload_leistungen' });
    });

    list.appendChild(row);
  });
}

// ── Leistungskarte bearbeiten (L3) ──
function buildL3Leistung(leistung) {
  const c = document.getElementById('l3-content');
  c.innerHTML = '';
  const isNew = !leistung;
  const l = leistung || {};
  const body = document.createElement('div');
  body.className = 'sf-body';

  let selectedIcon = l.icon || 'paintbrush';
  let currentBildUrl = l.bild_url || '';

  // Titel
  const lblTitel = document.createElement('label'); lblTitel.className = 'sf-label'; lblTitel.textContent = 'Titel';
  const titInput = document.createElement('input'); titInput.className = 'sf-input'; titInput.type = 'text'; titInput.value = l.titel || '';

  // Beschreibung
  const lblBesc = document.createElement('label'); lblBesc.className = 'sf-label'; lblBesc.textContent = 'Beschreibung';
  const bescInput = document.createElement('textarea'); bescInput.className = 'sf-textarea'; bescInput.value = l.beschreibung || '';

  // Tag
  const lblTag = document.createElement('label'); lblTag.className = 'sf-label'; lblTag.textContent = 'Tag / Label';
  const tagInput = document.createElement('input'); tagInput.className = 'sf-input'; tagInput.type = 'text'; tagInput.value = l.tag || '';

  // Icon picker
  const lblIcon = document.createElement('label'); lblIcon.className = 'sf-label'; lblIcon.textContent = 'Icon wählen';
  const iconGrid = document.createElement('div');
  iconGrid.style.cssText = 'display:grid;grid-template-columns:repeat(5,1fr);gap:6px;';
  LEISTUNG_ICONS.forEach(icon => {
    const btn = document.createElement('button');
    btn.title = icon;
    btn.type = 'button';
    btn.style.cssText = `display:flex;align-items:center;justify-content:center;height:40px;border-radius:6px;cursor:pointer;transition:border-color 0.15s,background 0.15s;border:2px solid ${icon === selectedIcon ? 'var(--green)' : 'var(--border)'};background:${icon === selectedIcon ? 'rgba(46,190,110,0.1)' : 'none'};`;
    btn.innerHTML = `<i data-lucide="${icon}" width="18" height="18"></i>`;
    btn.addEventListener('click', () => {
      selectedIcon = icon;
      iconGrid.querySelectorAll('button').forEach(b => { b.style.borderColor = 'var(--border)'; b.style.background = 'none'; });
      btn.style.borderColor = 'var(--green)';
      btn.style.background = 'rgba(46,190,110,0.1)';
    });
    iconGrid.appendChild(btn);
  });

  // Bild
  const lblBild = document.createElement('label'); lblBild.className = 'sf-label'; lblBild.textContent = 'Hintergrundbild';
  const previewBox = document.createElement('div');
  previewBox.className = 'media-preview-box';
  renderMediaPreview(previewBox, currentBildUrl);

  const uploadBtn = document.createElement('button');
  uploadBtn.className = 'sf-btn sf-btn-green';
  uploadBtn.type = 'button';
  uploadBtn.textContent = '📷  Bild hochladen';
  uploadBtn.addEventListener('click', () => {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = 'image/*';
    inp.onchange = async () => {
      const file = inp.files[0]; if (!file) return;
      toast('⏳ Hochladen...');
      const ext = file.name.split('.').pop().toLowerCase();
      const path = 'leistung_' + (l.id || 'new') + '_' + Date.now() + '.' + ext;
      const { error } = await db.storage.from('bilder').upload(path, file, { upsert: true });
      if (error) { toast('❌ ' + error.message, true); return; }
      const { data: urlData } = db.storage.from('bilder').getPublicUrl(path);
      currentBildUrl = urlData.publicUrl;
      renderMediaPreview(previewBox, currentBildUrl);
      toast('✓ Hochgeladen!');
    };
    inp.click();
  });

  const removeImgBtn = document.createElement('button');
  removeImgBtn.className = 'sf-btn sf-btn-gray';
  removeImgBtn.type = 'button';
  removeImgBtn.textContent = '🗑  Bild entfernen';
  removeImgBtn.addEventListener('click', () => { currentBildUrl = ''; renderMediaPreview(previewBox, ''); });

  // Speichern
  const saveBtn = document.createElement('button');
  saveBtn.className = 'sf-btn sf-btn-green';
  saveBtn.type = 'button';
  saveBtn.textContent = isNew ? '＋ Erstellen' : 'Speichern';
  saveBtn.addEventListener('click', async () => {
    if (!titInput.value.trim()) { toast('❌ Bitte Titel eingeben', true); return; }
    const payload = {
      titel: titInput.value.trim(),
      beschreibung: bescInput.value.trim(),
      tag: tagInput.value.trim(),
      icon: selectedIcon,
      bild_url: currentBildUrl || null,
      aktiv: l.aktiv !== undefined ? l.aktiv : true,
    };
    if (isNew) {
      const maxR = leistungenCache.length ? Math.max(...leistungenCache.map(x => x.reihenfolge)) : 0;
      payload.reihenfolge = maxR + 10;
      await db.from('leistungen').insert(payload);
    } else {
      payload.id = l.id;
      payload.reihenfolge = l.reihenfolge;
      await db.from('leistungen').upsert(payload);
    }
    await loadLeistungen();
    sendToIframe({ type: 'cms_reload_leistungen' });
    toast('✓ Gespeichert!');
    goBack();
  });

  body.appendChild(lblTitel); body.appendChild(titInput);
  body.appendChild(lblBesc); body.appendChild(bescInput);
  body.appendChild(lblTag); body.appendChild(tagInput);
  body.appendChild(lblIcon); body.appendChild(iconGrid);
  body.appendChild(lblBild); body.appendChild(previewBox);
  body.appendChild(uploadBtn); body.appendChild(removeImgBtn);
  body.appendChild(saveBtn);
  c.appendChild(body);
  setTimeout(() => lucide.createIcons(), 50);
}

// ── Colors ──
function buildL3Colors() {
  const c = document.getElementById('l3-content');
  c.innerHTML = `<div class="panel-section-title">FARBPALETTE</div>`;
  const body = document.createElement('div');
  body.className = 'sf-body';
  COLORS.forEach(col => {
    const current = contentCache['color_' + col.var.replace('--', '')] || col.default;
    const label = document.createElement('label');
    label.className = 'sf-label';
    label.textContent = col.label;
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:10px;';
    const swatch = document.createElement('div');
    swatch.style.cssText = `width:36px;height:36px;border-radius:6px;background:${current};border:1.5px solid var(--border);flex-shrink:0;cursor:pointer;`;
    const inp = document.createElement('input');
    inp.type = 'color';
    inp.value = current;
    inp.style.cssText = 'flex:1;height:36px;border:1.5px solid var(--border);border-radius:6px;cursor:pointer;padding:2px;';
    inp.addEventListener('input', () => {
      swatch.style.background = inp.value;
      sendToIframe({ type:'cms_color', var: col.var, value: inp.value });
    });
    inp.addEventListener('change', async () => {
      await saveContent('color_' + col.var.replace('--',''), inp.value, 'text');
      toast('✓ Farbe gespeichert!');
    });
    swatch.addEventListener('click', () => inp.click());
    row.appendChild(swatch);
    row.appendChild(inp);
    body.appendChild(label);
    body.appendChild(row);
  });
  c.appendChild(body);
}

// open color picker inline (from swatch click in Design page)
function openColorPicker(col, swatchEl) {
  const inp = document.createElement('input');
  inp.type = 'color';
  inp.value = swatchEl.style.background || col.default;
  inp.style.cssText = 'position:absolute;opacity:0;pointer-events:none;';
  document.body.appendChild(inp);
  inp.addEventListener('input', () => {
    swatchEl.style.background = inp.value;
    sendToIframe({ type:'cms_color', var: col.var, value: inp.value });
  });
  inp.addEventListener('change', async () => {
    await saveContent('color_' + col.var.replace('--',''), inp.value, 'text');
    document.body.removeChild(inp);
    toast('✓ Farbe gespeichert!');
  });
  inp.click();
}

// ── Fonts ──
function buildL3Fonts() {
  const c = document.getElementById('l3-content');
  c.innerHTML = `<div class="panel-section-title">SCHRIFTPAAR</div>`;
  const body = document.createElement('div');
  body.className = 'sf-body';

  const hVal = contentCache['font_heading'] || 'Montserrat';
  const bVal = contentCache['font_body'] || 'Open Sans';

  // Preview
  const preview = document.createElement('div');
  preview.className = 'font-preview-box';
  preview.id = 'font-preview-box';
  preview.innerHTML = `
    <div class="fp-label" id="fp-label">${hVal.toUpperCase()} + ${bVal.toUpperCase()}</div>
    <div class="fp-heading" id="fp-heading" style="font-family:'${hVal}',sans-serif">Überschrift</div>
    <div class="fp-body" id="fp-body" style="font-family:'${bVal}',sans-serif">Fliesstext – sauber und lesbar.</div>`;
  body.appendChild(preview);

  function makeSelect(label, options, currentVal, onChange) {
    const lbl = document.createElement('label');
    lbl.className = 'sf-label';
    lbl.textContent = label;
    lbl.style.marginTop = '10px';
    const sel = document.createElement('select');
    sel.className = 'sf-input';
    options.forEach(opt => {
      const o = document.createElement('option');
      o.value = opt; o.textContent = opt;
      if (opt === currentVal) o.selected = true;
      sel.appendChild(o);
    });
    sel.addEventListener('change', () => onChange(sel.value));
    body.appendChild(lbl);
    body.appendChild(sel);
    return sel;
  }

  let hFont = hVal, bFont = bVal;

  makeSelect('Überschriften-Schrift', FONTS_HEADING, hVal, val => {
    hFont = val;
    document.getElementById('fp-heading').style.fontFamily = `'${val}',sans-serif`;
    document.getElementById('fp-label').textContent = `${hFont.toUpperCase()} + ${bFont.toUpperCase()}`;
    sendToIframe({ type:'cms_font', target:'heading', family: val });
  });
  makeSelect('Fliesstext-Schrift', FONTS_BODY, bVal, val => {
    bFont = val;
    document.getElementById('fp-body').style.fontFamily = `'${val}',sans-serif`;
    document.getElementById('fp-label').textContent = `${hFont.toUpperCase()} + ${bFont.toUpperCase()}`;
    sendToIframe({ type:'cms_font', target:'body', family: val });
  });

  const saveBtn = document.createElement('button');
  saveBtn.className = 'sf-btn sf-btn-green';
  saveBtn.style.marginTop = '4px';
  saveBtn.textContent = 'Schriftpaar speichern';
  saveBtn.addEventListener('click', async () => {
    await saveContent('font_heading', hFont, 'text');
    await saveContent('font_body', bFont, 'text');
    toast('✓ Schriftpaar gespeichert!');
  });
  body.appendChild(saveBtn);
  c.appendChild(body);
}

// ── Media ──
function buildL3Media(item) {
  const c = document.getElementById('l3-content');
  c.innerHTML = '';
  const body = document.createElement('div');
  body.className = 'sf-body';

  const previewBox = document.createElement('div');
  previewBox.className = 'media-preview-box';
  previewBox.id = 'media-preview';
  renderMediaPreview(previewBox, contentCache[item.key] || '');
  body.appendChild(previewBox);

  const uploadBtn = document.createElement('button');
  uploadBtn.className = 'sf-btn sf-btn-green';
  uploadBtn.textContent = '📷  Bild oder Video hochladen';
  uploadBtn.addEventListener('click', () => doUpload(item.key, previewBox));
  body.appendChild(uploadBtn);

  const removeBtn = document.createElement('button');
  removeBtn.className = 'sf-btn sf-btn-red';
  removeBtn.textContent = '🗑  Entfernen';
  removeBtn.addEventListener('click', async () => {
    await saveContent(item.key, '', 'media');
    renderMediaPreview(previewBox, '');
    // Update dot in parent list
    toast('✓ Entfernt');
  });
  body.appendChild(removeBtn);
  c.appendChild(body);
}

function renderMediaPreview(box, url) {
  if (!url) {
    box.innerHTML = '<span>Kein Inhalt</span>';
    return;
  }
  const isVid = /\.(mp4|webm)/i.test(url);
  box.innerHTML = isVid
    ? `<video src="${url}" autoplay muted loop style="width:100%;height:100%;object-fit:cover;border-radius:7px;"></video>`
    : `<img src="${url}" style="width:100%;height:100%;object-fit:cover;border-radius:7px;">`;
}

// ── Text ──
function buildL3Text(item) {
  const c = document.getElementById('l3-content');
  c.innerHTML = '';
  const body = document.createElement('div');
  body.className = 'sf-body';

  const lbl = document.createElement('label');
  lbl.className = 'sf-label';
  lbl.textContent = item.label;

  saveBtn.addEventListener('click', async () => {

  body.appendChild(ta);

// ── FAQ Item ──
function buildL3FaqItem(faq) {
  const c = document.getElementById('l3-content');
  c.innerHTML = '';
  const body = document.createElement('div');
  body.className = 'sf-body';
  const isNew = !faq;

  const lbl1 = document.createElement('label'); lbl1.className = 'sf-label'; lbl1.textContent = 'Frage';
  const taq = document.createElement('textarea'); taq.className = 'sf-textarea'; taq.rows = 2;
  taq.value = faq?.frage || '';

  const lbl2 = document.createElement('label'); lbl2.className = 'sf-label'; lbl2.style.marginTop = '4px'; lbl2.textContent = 'Antwort';
  const taa = document.createElement('textarea'); taa.className = 'sf-textarea'; taa.rows = 4;
  taa.value = faq?.antwort || '';

  const aktiv = document.createElement('label');
  aktiv.style.cssText = 'display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;';
  aktiv.innerHTML = `<input type="checkbox" ${faq?.aktiv !== false ? 'checked' : ''} style="width:16px;height:16px;accent-color:var(--green);"> Aktiv (wird auf Website angezeigt)`;

  const saveBtn = document.createElement('button');
  saveBtn.className = 'sf-btn sf-btn-green';
  saveBtn.textContent = isNew ? '+ Erstellen' : 'Speichern';
  saveBtn.addEventListener('click', async () => {
    const data = { frage: taq.value, antwort: taa.value, aktiv: aktiv.querySelector('input').checked };
    if (isNew) {
      data.reihenfolge = (faqCache.length + 1) * 10;
      await db.from('faq').insert(data);
    } else {
      await db.from('faq').update(data).eq('id', faq.id);
    }
    await loadFaq();
    goBack();
    toast('✓ FAQ gespeichert!');
  });

  body.appendChild(lbl1); body.appendChild(taq);
  body.appendChild(lbl2); body.appendChild(taa);
  body.appendChild(aktiv);
  body.appendChild(saveBtn);

  if (!isNew) {
    const delBtn = document.createElement('button');
    delBtn.className = 'sf-btn sf-btn-red';
    delBtn.textContent = 'Frage löschen';
    delBtn.addEventListener('click', async () => {
      if (!confirm('Frage wirklich löschen?')) return;
      await db.from('faq').delete().eq('id', faq.id);
      await loadFaq();
      goBack();
      toast('✓ Gelöscht');
    });
    body.appendChild(delBtn);
  }
  c.appendChild(body);
}

// ══════════════════════════════════════════════════════════
// SAVE & UPLOAD
// ══════════════════════════════════════════════════════════
async function saveContent(key, value, type) {
  const oldVal = contentCache[key] || '';
  await db.from('content').upsert({ key, value, updated_at: new Date().toISOString() }, { onConflict: 'key' });
  if (oldVal !== value) {
    pushUndo(key, oldVal, value);
    contentCache[key] = value;
  }
  sendToIframe({ type: type === 'media' ? 'cms_media' : 'cms_text', key, value });
}

async function doUpload(key, previewBox) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*,video/mp4,video/webm';
  input.onchange = async () => {
    const file = input.files[0]; if (!file) return;
    toast('⏳ Hochladen...');
    const ext = file.name.split('.').pop().toLowerCase();
    const path = key + '_' + Date.now() + '.' + ext;
    const { error: e1 } = await db.storage.from('bilder').upload(path, file, { upsert: true });
    if (e1) { toast('❌ ' + e1.message, true); return; }
    const { data } = db.storage.from('bilder').getPublicUrl(path);
    const url = data.publicUrl;
    await saveContent(key, url, 'media');
    renderMediaPreview(previewBox, url);
    toast('✓ Gespeichert!');
  };
  input.click();
}

async function toggleFaqAktiv(id, aktiv) {
  await db.from('faq').update({ aktiv }).eq('id', id);
  const idx = faqCache.findIndex(f => f.id === id);
  if (idx !== -1) faqCache[idx].aktiv = aktiv;
}

// ══════════════════════════════════════════════════════════
// IFRAME COMMUNICATION
// ══════════════════════════════════════════════════════════
function sendToIframe(msg) {
  document.getElementById('preview-iframe').contentWindow.postMessage(msg, '*');
}

// Handle cms_select from iframe (click on element)
window.addEventListener('message', e => {
  if (!e.data) return;
  if (e.data.type === 'cms_select') {
    const { key, editable } = e.data;
    if (editable === 'image') {
      const item = MEDIA_ITEMS.find(m => m.key === key);
      if (item) {
        goL2('medien', 'Hauptmenü');
        setTimeout(() => goL3(() => buildL3Media(item), item.label), 260);
      }
    } else if (editable === 'text') {
      const item = TEXT_ITEMS.find(t => t.key === key) || KONTAKT_ITEMS.find(t => t.key === key);
      if (item && TEXT_ITEMS.find(t => t.key === key)) {
        goL2('texte', 'Hauptmenü');
        setTimeout(() => goL3(() => buildL3Text(item), item.label), 260);
      } else if (item) {
        goL2('kontakt', 'Hauptmenü');
      }
    }
    // Highlight active L1 item
    document.querySelectorAll('#l1-menu .menu-item').forEach(el => el.classList.remove('active'));
    const target = editable === 'image' ? 'medien' : 'texte';
    const l1 = L1_ITEMS.findIndex(i => i.page === target);
    if (l1 >= 0) document.querySelectorAll('#l1-menu .menu-item')[l1]?.classList.add('active');
  }
});

function setBreakpoint(bp) {
  const wrap = document.getElementById('iframe-wrap');
  const outer = document.getElementById('iframe-scale-wrap');
  wrap.className = bp === 'desktop' ? '' : bp;
  if (bp === 'desktop') {
    outer.style.padding = '0';
    document.getElementById('iframe-outer').style.background = '#c8c8c0';
  } else {
    outer.style.padding = '16px';
    document.getElementById('iframe-outer').style.background = '#a8a8a0';
  }
  ['desktop','tablet','mobile'].forEach(b => {
    document.getElementById('bp-'+b)?.classList.toggle('active', b === bp);
  });
}

// ══════════════════════════════════════════════════════════
// UNDO / REDO
// ══════════════════════════════════════════════════════════
function pushUndo(key, oldVal, newVal) {
  undoStack.push({ key, oldVal, newVal });
  redoStack = [];
  syncUndoButtons();
}
function syncUndoButtons() {
  document.getElementById('btn-undo').disabled = !undoStack.length;
  document.getElementById('btn-redo').disabled = !redoStack.length;
}
async function doUndo() {
  if (!undoStack.length) return;
  const { key, oldVal } = undoStack.pop();
  redoStack.push({ key, oldVal, newVal: contentCache[key] });
  await db.from('content').upsert({ key, value: oldVal, updated_at: new Date().toISOString() }, { onConflict:'key' });
  contentCache[key] = oldVal;
  sendToIframe({ type: TEXT_KEYS.has(key) ? 'cms_text' : 'cms_media', key, value: oldVal });
  syncUndoButtons();
  toast('↩ Rückgängig');
}
async function doRedo() {
  if (!redoStack.length) return;
  const { key, newVal } = redoStack.pop();
  undoStack.push({ key, oldVal: contentCache[key], newVal });
  await db.from('content').upsert({ key, value: newVal, updated_at: new Date().toISOString() }, { onConflict:'key' });
  contentCache[key] = newVal;
  sendToIframe({ type: TEXT_KEYS.has(key) ? 'cms_text' : 'cms_media', key, value: newVal });
  syncUndoButtons();
  toast('↪ Wiederholt');
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); doUndo(); }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); doRedo(); }
});

// ══════════════════════════════════════════════════════════
// PUBLISH + TOAST
// ══════════════════════════════════════════════════════════
function doPublish() {
  toast('✓ Alle Änderungen sind automatisch live gespeichert!');
}

function toast(msg, err=false) {
  const t = document.getElementById('toast');
  const isErr = err || msg.startsWith('❌');
  t.textContent = msg;
  t.style.cssText = `position:fixed;bottom:20px;right:20px;z-index:99999;padding:11px 18px;
    border-radius:8px;font-family:'Montserrat',sans-serif;font-weight:600;font-size:13px;
    background:${isErr?'#e74c3c':'#2EBE6E'};color:${isErr?'#fff':'#000'};
    box-shadow:0 4px 14px rgba(0,0,0,0.15);display:block;`;
  clearTimeout(t._t);
  t._t = setTimeout(() => { t.style.display='none'; }, 3000);
}
