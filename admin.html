<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MalerMarc – Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --green: #2EBE6E;
    --green-dark: #1a9a52;
    --danger: #e74c3c;
    --bg: #f5f5f0;
    --white: #ffffff;
    --text: #1a1a1a;
    --text-muted: #888;
    --border: #e0e0d8;
    --sidebar-w: 240px;
    --panel-w: 300px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; font-family:'Open Sans',sans-serif; background:var(--bg); color:var(--text); }

  /* LOGIN */
  #login-screen {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(135deg,#f5f5f0,#eeeee8);
  }
  .login-card {
    background:var(--white); border-radius:16px; padding:3rem 2.5rem;
    width:100%; max-width:400px; box-shadow:0 8px 40px rgba(0,0,0,0.08);
  }
  .login-logo { font-family:'Montserrat',sans-serif; font-weight:900; font-size:1.8rem; text-align:center; margin-bottom:0.25rem; }
  .login-logo span { color:var(--green); }
  .login-sub { text-align:center; color:var(--text-muted); font-size:0.85rem; margin-bottom:2rem; }
  .form-field { display:flex; flex-direction:column; gap:0.4rem; margin-bottom:1rem; }
  .form-field label { font-family:'Montserrat',sans-serif; font-weight:600; font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); }
  .form-field input { border:1.5px solid var(--border); border-radius:8px; padding:0.75rem 0.9rem; font-size:0.9rem; outline:none; transition:border-color 0.2s; }
  .form-field input:focus { border-color:var(--green); }
  .login-error { color:var(--danger); font-size:0.85rem; margin-bottom:0.75rem; display:none; }

  /* ADMIN LAYOUT */
  #admin-app { display:none; height:100vh; }
  #admin-app.active { display:flex; }

  /* SIDEBAR */
  #sidebar {
    width:var(--sidebar-w); background:var(--white); border-right:1px solid var(--border);
    display:flex; flex-direction:column; overflow:hidden; flex-shrink:0;
  }
  .sidebar-header {
    padding:1.25rem 1rem; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .sidebar-logo { font-family:'Montserrat',sans-serif; font-weight:900; font-size:1.1rem; }
  .sidebar-logo span { color:var(--green); }
  .sidebar-logout { font-size:0.75rem; color:var(--text-muted); cursor:pointer; background:none; border:none; font-family:'Open Sans',sans-serif; }
  .sidebar-logout:hover { color:var(--danger); }
  .sidebar-nav { flex:1; overflow-y:auto; padding:0.75rem 0; }
  .nav-group-label {
    padding:0.5rem 1rem 0.3rem; font-family:'Montserrat',sans-serif; font-weight:700;
    font-size:0.65rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-muted);
  }
  .nav-item {
    display:flex; align-items:center; gap:0.5rem; padding:0.5rem 1rem;
    font-size:0.82rem; cursor:pointer; border-radius:0; transition:background 0.15s;
    border-left:3px solid transparent; color:var(--text);
  }
  .nav-item:hover { background:rgba(46,190,110,0.06); }
  .nav-item.active { background:rgba(46,190,110,0.1); border-left-color:var(--green); color:var(--green); font-weight:600; }
  .nav-item .nav-dot { width:8px; height:8px; border-radius:50%; background:var(--border); flex-shrink:0; }
  .nav-item.has-content .nav-dot { background:var(--green); }

  /* IFRAME */
  #iframe-wrap { flex:1; position:relative; overflow:hidden; }
  #preview-iframe { width:100%; height:100%; border:none; }

  /* EDIT PANEL */
  #edit-panel {
    width:var(--panel-w); background:var(--white); border-left:1px solid var(--border);
    display:none; flex-direction:column; overflow:hidden; flex-shrink:0;
  }
  #edit-panel.open { display:flex; }
  .panel-header {
    padding:1rem 1.25rem; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
  }
  .panel-title { font-family:'Montserrat',sans-serif; font-weight:700; font-size:0.9rem; }
  .panel-key { font-size:0.72rem; color:var(--text-muted); font-family:monospace; margin-top:0.1rem; }
  .panel-close { background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:1.2rem; line-height:1; }
  .panel-close:hover { color:var(--text); }
  .panel-body { flex:1; padding:1.25rem; overflow-y:auto; display:flex; flex-direction:column; gap:1rem; }

  /* BUTTONS */
  .btn { font-family:'Montserrat',sans-serif; font-weight:700; font-size:0.8rem; letter-spacing:0.06em; text-transform:uppercase; padding:0.7rem 1rem; border-radius:8px; border:none; cursor:pointer; width:100%; display:flex; align-items:center; justify-content:center; gap:0.5rem; transition:background 0.2s, transform 0.1s; }
  .btn:active { transform:scale(0.98); }
  .btn-green { background:var(--green); color:#000; }
  .btn-green:hover { background:var(--green-dark, #1a9a52); }
  .btn-red { background:var(--danger); color:#fff; }
  .btn-red:hover { background:#c0392b; }
  .btn-secondary { background:rgba(0,0,0,0.06); color:var(--text); }
  .btn-secondary:hover { background:rgba(0,0,0,0.1); }

  textarea.edit-textarea {
    width:100%; min-height:100px; border:1.5px solid var(--border); border-radius:8px;
    padding:0.75rem; font-size:0.9rem; font-family:'Open Sans',sans-serif; resize:vertical; outline:none;
    transition:border-color 0.2s;
  }
  textarea.edit-textarea:focus { border-color:var(--green); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Maler<span>Marc</span></div>
    <div class="login-sub">Admin — Content Management</div>
    <div id="login-error" class="login-error"></div>
    <div class="form-field">
      <label>E-Mail</label>
      <input type="email" id="login-email" value="marc@malermarc.ch" autocomplete="username">
    </div>
    <div class="form-field">
      <label>Passwort</label>
      <input type="password" id="login-pw" autocomplete="current-password">
    </div>
    <button class="btn btn-green" style="margin-top:0.5rem;" onclick="doLogin()">Anmelden</button>
  </div>
</div>

<!-- ADMIN APP -->
<div id="admin-app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">Maler<span>Marc</span></div>
      <button class="sidebar-logout" onclick="doLogout()">Abmelden</button>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
  </div>

  <!-- IFRAME -->
  <div id="iframe-wrap">
    <iframe id="preview-iframe" src="index.html?cms=1"></iframe>
  </div>

  <!-- EDIT PANEL -->
  <div id="edit-panel">
    <div class="panel-header">
      <div>
        <div class="panel-title" id="panel-title">—</div>
        <div class="panel-key" id="panel-key"></div>
      </div>
      <button class="panel-close" onclick="closePanel()">×</button>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </div>

</div>

<!-- TOAST -->
<div id="toast" style="display:none;"></div>

<script>
const SUPABASE_URL = 'https://zfyesnrezqupxolslbgx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpmeWVzbnJlenF1cHhvbHNsYmd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyOTIxOTcsImV4cCI6MjA4ODg2ODE5N30.8BeDmPJjYV7_UfGEW3E3wniq1HBx1_W85c-oxQuNuck';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let contentCache = {};
let currentKey = null;

// ─── NAVIGATION STRUCTURE ───────────────────────────────
const NAV = [
  { group: 'BILDER', items: [
    { key: 'hero_media',       label: 'Hero Hintergrund', type: 'media' },
    { key: 'bild_marc',        label: 'Portrait Marc',    type: 'media' },
    { key: 'referenz_vorher',  label: 'Vorher',           type: 'media' },
    { key: 'referenz_nachher', label: 'Nachher',          type: 'media' },
    { key: 'galerie_1',  label: 'Galerie 1',  type: 'media' },
    { key: 'galerie_2',  label: 'Galerie 2',  type: 'media' },
    { key: 'galerie_3',  label: 'Galerie 3',  type: 'media' },
    { key: 'galerie_4',  label: 'Galerie 4',  type: 'media' },
    { key: 'galerie_5',  label: 'Galerie 5',  type: 'media' },
    { key: 'galerie_6',  label: 'Galerie 6',  type: 'media' },
    { key: 'galerie_7',  label: 'Galerie 7',  type: 'media' },
    { key: 'galerie_8',  label: 'Galerie 8',  type: 'media' },
    { key: 'galerie_9',  label: 'Galerie 9',  type: 'media' },
    { key: 'einblick_1', label: 'Einblick 1', type: 'media' },
    { key: 'einblick_2', label: 'Einblick 2', type: 'media' },
    { key: 'einblick_3', label: 'Einblick 3', type: 'media' },
    { key: 'einblick_4', label: 'Einblick 4', type: 'media' },
    { key: 'einblick_5', label: 'Einblick 5', type: 'media' },
    { key: 'einblick_6', label: 'Einblick 6', type: 'media' },
    { key: 'einblick_7', label: 'Einblick 7', type: 'media' },
    { key: 'einblick_8', label: 'Einblick 8', type: 'media' },
    { key: 'leistung_bild_1', label: 'Leistung 1', type: 'media' },
    { key: 'leistung_bild_2', label: 'Leistung 2', type: 'media' },
    { key: 'leistung_bild_3', label: 'Leistung 3', type: 'media' },
    { key: 'leistung_bild_4', label: 'Leistung 4', type: 'media' },
    { key: 'leistung_bild_5', label: 'Leistung 5', type: 'media' },
    { key: 'leistung_bild_6', label: 'Leistung 6', type: 'media' },
  ]},
  { group: 'TEXTE', items: [
    { key: 'hero_titel',       label: 'Hero Titel',      type: 'text' },
    { key: 'hero_sub',         label: 'Hero Untertitel', type: 'text' },
    { key: 'ueber_titel',      label: 'Über mich Titel', type: 'text' },
    { key: 'ueber_text',       label: 'Über mich Text',  type: 'text' },
    { key: 'kontakt_telefon',  label: 'Telefon',         type: 'text' },
    { key: 'kontakt_email',    label: 'E-Mail',          type: 'text' },
    { key: 'kontakt_adresse',  label: 'Adresse',         type: 'text' },
    { key: 'kontakt_zeiten',   label: 'Öffnungszeiten',  type: 'text' },
    { key: 'stat_projekte',    label: 'Stat: Projekte',  type: 'text' },
    { key: 'stat_jahre',       label: 'Stat: Jahre',     type: 'text' },
  ]},
];

// ─── LOGIN / LOGOUT ──────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-pw').value;
  const errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  const { error } = await db.auth.signInWithPassword({ email, password: pw });
  if (error) {
    errEl.textContent = error.message;
    errEl.style.display = 'block';
    return;
  }
  showAdmin();
}

async function doLogout() {
  await db.auth.signOut();
  document.getElementById('admin-app').classList.remove('active');
  document.getElementById('login-screen').style.display = 'flex';
}

async function checkSession() {
  const { data: { session } } = await db.auth.getSession();
  if (session) showAdmin();
}

async function showAdmin() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-app').classList.add('active');
  await loadContent();
  buildNav();
}

// ─── CONTENT LOADING ─────────────────────────────────────
async function loadContent() {
  const { data } = await db.from('content').select('key,value');
  if (data) data.forEach(({ key, value }) => { contentCache[key] = value || ''; });
}

// ─── NAVIGATION ──────────────────────────────────────────
function buildNav() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';
  NAV.forEach(group => {
    const label = document.createElement('div');
    label.className = 'nav-group-label';
    label.textContent = group.group;
    nav.appendChild(label);
    group.items.forEach(item => {
      const el = document.createElement('div');
      el.className = 'nav-item' + (contentCache[item.key] ? ' has-content' : '');
      el.dataset.key = item.key;
      el.innerHTML = `<span class="nav-dot"></span><span>${item.label}</span>`;
      el.addEventListener('click', () => selectItem(item));
      nav.appendChild(el);
    });
  });
}

function selectItem(item) {
  currentKey = item.key;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.key === item.key));
  const panel = document.getElementById('edit-panel');
  panel.classList.add('open');
  document.getElementById('panel-title').textContent = item.label;
  document.getElementById('panel-key').textContent = item.key;
  const body = document.getElementById('panel-body');
  if (item.type === 'media') {
    const url = contentCache[item.key] || '';
    body.innerHTML = `
      <div id="media-preview"></div>
      <button class="btn btn-green" onclick="doUpload('${item.key}')">&#xFF0B; Bild oder Video hochladen</button>
      <button class="btn btn-red" onclick="doEntfernen('${item.key}')">&#x00D7; Entfernen</button>
    `;
    zeigeVorschau(item.key, url);
  } else {
    const val = contentCache[item.key] || '';
    body.innerHTML = `
      <textarea class="edit-textarea" id="text-input">${val.replace(/</g,'&lt;')}</textarea>
      <button class="btn btn-green" onclick="doSaveText('${item.key}')">Speichern</button>
    `;
  }
}

function closePanel() {
  document.getElementById('edit-panel').classList.remove('open');
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  currentKey = null;
}

// ─── MEDIA UPLOAD ─────────────────────────────────────────
async function doUpload(key) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*,video/mp4,video/webm';
  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;
    toast('\u23F3 Hochladen...');
    const ext = file.name.split('.').pop().toLowerCase();
    const path = key + '_' + Date.now() + '.' + ext;
    const { error: e1 } = await db.storage
      .from('bilder').upload(path, file, { upsert: true });
    if (e1) { toast('\u274C ' + e1.message, true); return; }
    const { data } = db.storage.from('bilder').getPublicUrl(path);
    const url = data.publicUrl;
    const { error: e2 } = await db.from('content').upsert(
      { key, value: url, updated_at: new Date().toISOString() },
      { onConflict: 'key' }
    );
    if (e2) { toast('\u274C ' + e2.message, true); return; }
    contentCache[key] = url;
    document.getElementById('preview-iframe')
      .contentWindow.postMessage({ type: 'cms_media', key, value: url }, '*');
    zeigeVorschau(key, url);
    updateNavDot(key, true);
    toast('\u2713 Gespeichert!');
  };
  input.click();
}

async function doEntfernen(key) {
  const { error } = await db.from('content').upsert(
    { key, value: '', updated_at: new Date().toISOString() },
    { onConflict: 'key' }
  );
  if (error) { toast('\u274C ' + error.message, true); return; }
  contentCache[key] = '';
  document.getElementById('preview-iframe')
    .contentWindow.postMessage({ type: 'cms_media', key, value: '' }, '*');
  zeigeVorschau(key, '');
  updateNavDot(key, false);
  toast('\u2713 Entfernt');
}

async function doSaveText(key) {
  const value = document.getElementById('text-input').value;
  const { error } = await db.from('content').upsert(
    { key, value, updated_at: new Date().toISOString() },
    { onConflict: 'key' }
  );
  if (error) { toast('\u274C ' + error.message, true); return; }
  contentCache[key] = value;
  document.getElementById('preview-iframe')
    .contentWindow.postMessage({ type: 'cms_text', key, value }, '*');
  updateNavDot(key, !!value);
  toast('\u2713 Gespeichert!');
}

// ─── HELPERS ─────────────────────────────────────────────
function zeigeVorschau(key, url) {
  const el = document.getElementById('media-preview');
  if (!el) return;
  if (!url) {
    el.innerHTML = '<div style="height:180px; background:#f0f0ec; border-radius:8px; display:flex; align-items:center; justify-content:center; color:#aaa;">Kein Inhalt</div>';
    return;
  }
  const isVid = /\.(mp4|webm)/i.test(url);
  el.innerHTML = isVid
    ? `<video src="${url}" autoplay muted loop style="width:100%; height:180px; object-fit:cover; border-radius:8px;"></video>`
    : `<img src="${url}" style="width:100%; height:180px; object-fit:cover; border-radius:8px;">`;
}

function updateNavDot(key, hasContent) {
  const item = document.querySelector(`.nav-item[data-key="${key}"]`);
  if (item) item.classList.toggle('has-content', hasContent);
}

function toast(msg, err = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.cssText = `position:fixed; bottom:24px; right:24px; padding:12px 20px; border-radius:8px;
    font-family:Montserrat,sans-serif; font-weight:600; font-size:14px; z-index:9999; display:block;
    background:${err ? '#e74c3c; color:#fff' : '#2EBE6E; color:#000'};`;
  clearTimeout(t._t);
  t._t = setTimeout(() => t.style.display = 'none', 3000);
}

// ─── LOGIN FORM ENTER KEY ─────────────────────────────────
document.getElementById('login-pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ─── INIT ─────────────────────────────────────────────────
checkSession();
</script>
</body>
</html>
